name: myapp
description: go-api 的 Flutter 前端基础工程
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.2"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_html: ^3.0.0-beta.2
  awesome_notifications: ^0.9.3+1
  dio: ^5.7.0
  ota_update: ^6.0.0
  mobile_scanner: ^6.0.11
  url_launcher: ^6.3.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  shared_preferences: ^2.2.3
  package_info_plus: ^8.0.2
  image_picker: ^1.1.1
  image_cropper: ^7.1.0
  pretty_qr_code: ^3.3.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
